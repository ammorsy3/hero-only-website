<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ÆRITH — Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Tenor+Sans&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --ink:     #0e0d0b;
      --cream:   #f5f0e8;
      --sand:    #c9b99a;
      --gold:    #b8935a;
      --muted:   #6b6458;
      --border:  rgba(185, 163, 120, 0.22);
    }

    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--cream);
      font-family: 'Tenor Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Gradient backdrop ── */
    .scene {
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 60% at 15% 0%,  rgba(100, 78, 40, 0.28) 0%, transparent 60%),
        radial-gradient(ellipse 55% 40% at 90% 20%, rgba(60, 50, 30, 0.22) 0%, transparent 55%),
        radial-gradient(ellipse 100% 80% at 50% 100%, rgba(20, 18, 12, 0.9) 0%, transparent 80%),
        var(--ink);
    }

    /* ──────────────────────────────────────────
       ANNOUNCEMENT BAR
    ────────────────────────────────────────── */
    .announce {
      width: 100%;
      background: var(--gold);
      color: var(--ink);
      text-align: center;
      padding: 9px 24px;
      font-family: 'Tenor Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      animation: slideDown 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .announce a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: rgba(14,13,11,0.4);
    }

    /* ──────────────────────────────────────────
       HEADER
    ────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
    }

    .header-inner {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 48px;
      height: 76px;
      border-bottom: 1px solid var(--border);
      background: rgba(14, 13, 11, 0.72);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      animation: fadeIn 0.8s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* ── Left nav ── */
    .nav-left {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    /* ── Wordmark / Logo ── */
    .wordmark {
      text-align: center;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      animation: wordmarkIn 1s 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .wordmark-primary {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 28px;
      letter-spacing: 0.28em;
      color: var(--cream);
      line-height: 1;
      text-transform: uppercase;
    }

    .wordmark-sub {
      font-family: 'Tenor Sans', sans-serif;
      font-size: 8.5px;
      letter-spacing: 0.42em;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* ── Right nav ── */
    .nav-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 36px;
    }

    /* ── Nav links shared ── */
    .nav-link {
      position: relative;
      text-decoration: none;
      font-family: 'Tenor Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sand);
      transition: color 0.3s ease;
      padding-bottom: 2px;
      animation: fadeInUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .nav-link:hover {
      color: var(--cream);
    }

    .nav-link:hover::after {
      width: 100%;
    }

    /* Staggered entrance for nav links */
    .nav-left .nav-link:nth-child(1) { animation-delay: 0.45s; }
    .nav-left .nav-link:nth-child(2) { animation-delay: 0.55s; }
    .nav-left .nav-link:nth-child(3) { animation-delay: 0.65s; }
    .nav-right .nav-link:nth-child(1) { animation-delay: 0.75s; }
    .nav-right .nav-link:nth-child(2) { animation-delay: 0.85s; }

    /* ── CTA button ── */
    .nav-cta {
      animation-delay: 0.95s !important;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-family: 'Tenor Sans', sans-serif;
      font-size: 10.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--gold);
      padding: 9px 20px;
      border: 1px solid var(--gold);
      transition: background 0.3s ease, color 0.3s ease;
    }

    .nav-cta:hover {
      background: transparent;
      color: var(--gold);
    }

    .nav-cta::after {
      display: none !important; /* remove underline pseudo-element for button */
    }

    /* ── Divider dot ── */
    .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ──────────────────────────────────────────
       HERO
    ────────────────────────────────────────── */
    .hero {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 115px);
      text-align: center;
      padding: 80px 24px;
      overflow: hidden;

      /* Background image */
      background-image: url('hero-bg.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;

      animation: fadeIn 1.2s 0.6s ease both;
    }

    /* Dark overlay so text stays legible */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(14,13,11,0.45) 0%, rgba(14,13,11,0.75) 100%),
        linear-gradient(to bottom, rgba(14,13,11,0.3) 0%, rgba(14,13,11,0.6) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    .hero-eyebrow {
      font-family: 'Tenor Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(52px, 8vw, 112px);
      line-height: 0.96;
      color: var(--cream);
      letter-spacing: -0.01em;
      max-width: 900px;
    }

    .hero-title em {
      font-style: italic;
      color: var(--sand);
    }

    .hero-rule {
      width: 1px;
      height: 80px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      margin: 40px auto 0;
    }

    /* ──────────────────────────────────────────
       KEYFRAMES
    ────────────────────────────────────────── */
    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    @keyframes wordmarkIn {
      from { opacity: 0; transform: translateY(-6px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    /* ──────────────────────────────────────────
       MOBILE
    ────────────────────────────────────────── */
    @media (max-width: 768px) {
      .header-inner {
        padding: 0 24px;
        grid-template-columns: 1fr auto;
      }

      .nav-left,
      .nav-right .nav-link:not(.nav-cta) {
        display: none;
      }

      .nav-right {
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">

    <!-- Announcement bar -->
    <div class="announce">
      New collection launching April 2026 &nbsp;·&nbsp;
      <a href="#">Preview the lookbook →</a>
    </div>

    <!-- Header -->
    <header>
      <div class="header-inner">

        <!-- Left navigation -->
        <nav class="nav-left" aria-label="Primary left">
          <a href="#" class="nav-link">Work</a>
          <div class="dot" aria-hidden="true"></div>
          <a href="#" class="nav-link">Studio</a>
          <div class="dot" aria-hidden="true"></div>
          <a href="#" class="nav-link">Journal</a>
        </nav>

        <!-- Wordmark (center) -->
        <a href="#" class="wordmark" aria-label="ÆRITH Studio — Home">
          <span class="wordmark-primary">Ærith</span>
          <span class="wordmark-sub">Studio</span>
        </a>

        <!-- Right navigation -->
        <nav class="nav-right" aria-label="Primary right">
          <a href="#" class="nav-link">Clients</a>
          <a href="#" class="nav-link nav-cta">Enquire</a>
        </nav>

      </div>
    </header>

    <!-- Hero (context only — not the focus) -->
    <section class="hero" aria-label="Hero">
      <p class="hero-eyebrow">Atelier of spatial narratives</p>
      <h1 class="hero-title">Design that<br /><em>endures</em></h1>
      <div class="hero-rule" aria-hidden="true"></div>
    </section>

  </div>
</body>
</html>
