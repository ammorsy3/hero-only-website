<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ÆRITH — Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Tenor+Sans&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink:    #0e0d0b;
      --bg:     #111010;
      --surface:#1a1917;
      --cream:  #f0ebe2;
      --sand:   #c9b99a;
      --gold:   #b8935a;
      --border: rgba(185,163,120,0.15);
      --gap:    4px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: 'Tenor Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 200;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 48px;
      height: 72px;
      background: rgba(14,13,11,0.85);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-bottom: 1px solid var(--border);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .nav-link {
      position: relative;
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sand);
      padding-bottom: 2px;
      transition: color 0.25s;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1px;
      background: var(--gold);
      transition: width 0.3s cubic-bezier(0.22,1,0.36,1);
    }

    .nav-link:hover { color: var(--cream); }
    .nav-link:hover::after { width: 100%; }

    .dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }

    .wordmark {
      text-align: center;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .wordmark-primary {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 26px;
      letter-spacing: 0.28em;
      color: var(--cream);
      line-height: 1;
      text-transform: uppercase;
    }

    .wordmark-sub {
      font-size: 8px;
      letter-spacing: 0.42em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .nav-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 32px;
    }

    .nav-cta {
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--gold);
      padding: 8px 18px;
      border: 1px solid var(--gold);
      transition: background 0.25s, color 0.25s;
    }

    .nav-cta:hover { background: transparent; color: var(--gold); }
    .nav-cta::after { display: none !important; }

    /* ─── GALLERY TOOLBAR ─────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 48px 16px;
    }

    .toolbar-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 22px;
      letter-spacing: 0.06em;
      color: var(--cream);
    }

    .photo-count {
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--sand);
      text-transform: uppercase;
    }

    /* ─── EMPTY STATE ─────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      min-height: 60vh;
      color: var(--sand);
      text-align: center;
      padding: 40px;
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      opacity: 0.3;
    }

    .empty h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 28px;
      letter-spacing: 0.04em;
      color: var(--cream);
      opacity: 0.5;
    }

    .empty p {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    /* ─── JUSTIFIED GRID ──────────────────────── */
    #gallery {
      padding: 0 44px 60px;
    }

    .gallery-row {
      display: flex;
      gap: var(--gap);
      margin-bottom: var(--gap);
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
      background: var(--surface);
    }

    .gallery-item img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), filter 0.4s ease;
      will-change: transform;
    }

    .gallery-item:hover img {
      transform: scale(1.04);
      filter: brightness(1.08);
    }

    .gallery-item-overlay {
      position: absolute;
      inset: 0;
      background: rgba(14,13,11,0);
      transition: background 0.35s ease;
      pointer-events: none;
    }

    .gallery-item:hover .gallery-item-overlay {
      background: rgba(14,13,11,0.15);
    }

    /* ─── LIGHTBOX ────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(10, 9, 8, 0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #lightbox.open { display: flex; }

    #lightbox-img {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      border: 1px solid var(--border);
      box-shadow: 0 40px 120px rgba(0,0,0,0.8);
      animation: lbIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes lbIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    .lb-close {
      position: fixed;
      top: 24px;
      right: 32px;
      background: none;
      border: none;
      color: var(--sand);
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
      z-index: 1000;
    }

    .lb-close:hover { color: var(--cream); }

    .lb-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(14,13,11,0.6);
      border: 1px solid var(--border);
      color: var(--sand);
      font-size: 20px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      z-index: 1000;
    }

    .lb-nav:hover { background: rgba(184,147,90,0.2); color: var(--cream); }
    .lb-prev { left: 24px; }
    .lb-next { right: 24px; }

    .lb-counter {
      margin-top: 16px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sand);
      opacity: 0.6;
    }

    /* ─── LIVE INDICATOR ─────────────────────── */
    .live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      margin-right: 6px;
      animation: pulse 2s infinite;
      vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ─── MOBILE ─────────────────────────────── */
    @media (max-width: 768px) {
      header { padding: 0 20px; grid-template-columns: 1fr auto; }
      .nav-left { display: none; }
      .toolbar { padding: 20px 20px 12px; }
      #gallery { padding: 0 16px 40px; }
      .lb-nav { display: none; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <nav class="nav-left">
      <a href="#" class="nav-link">Work</a>
      <div class="dot"></div>
      <a href="#" class="nav-link">Studio</a>
      <div class="dot"></div>
      <a href="#" class="nav-link">Journal</a>
    </nav>

    <a href="#" class="wordmark">
      <span class="wordmark-primary">Ærith</span>
      <span class="wordmark-sub">Studio</span>
    </a>

    <nav class="nav-right">
      <a href="#" class="nav-link">Clients</a>
      <a href="#" class="nav-link nav-cta">Enquire</a>
    </nav>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar-title">Gallery</span>
    <span class="photo-count">
      <span class="live-dot"></span>
      <span id="count">0 photos</span>
    </span>
  </div>

  <!-- Gallery -->
  <div id="gallery"></div>

  <!-- Empty state -->
  <div id="empty" class="empty" style="display:none">
    <svg class="empty-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="12" width="56" height="40" rx="3" stroke="currentColor" stroke-width="2"/>
      <circle cx="21" cy="26" r="5" stroke="currentColor" stroke-width="2"/>
      <path d="M4 40l14-12 10 10 10-8 22 18" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    </svg>
    <h2>No photos yet</h2>
    <p>Drop PNG files into the <code style="letter-spacing:0;font-family:monospace;opacity:0.7">/images</code> folder</p>
  </div>

  <!-- Lightbox -->
  <div id="lightbox">
    <button class="lb-close" id="lb-close" aria-label="Close">✕</button>
    <button class="lb-nav lb-prev" id="lb-prev" aria-label="Previous">‹</button>
    <img id="lightbox-img" src="" alt="" />
    <div class="lb-counter" id="lb-counter"></div>
    <button class="lb-nav lb-next" id="lb-next" aria-label="Next">›</button>
  </div>

  <script>
    const gallery  = document.getElementById('gallery');
    const empty    = document.getElementById('empty');
    const countEl  = document.getElementById('count');
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lightbox-img');
    const lbCounter = document.getElementById('lb-counter');

    const GAP = 4;
    const TARGET_HEIGHT = 260;

    let allImages = [];   // list of src strings
    let currentIndex = 0;

    // ── Justified grid layout ──────────────────────────────────────
    function buildGrid(srcs) {
      gallery.innerHTML = '';

      if (!srcs.length) {
        empty.style.display = 'flex';
        countEl.textContent = '0 photos';
        return;
      }

      empty.style.display = 'none';
      countEl.textContent = `${srcs.length} photo${srcs.length !== 1 ? 's' : ''}`;

      // Load all images first to get natural dimensions
      const loads = srcs.map(src => new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve({ src, w: img.naturalWidth, h: img.naturalHeight });
        img.onerror = () => resolve({ src, w: 4, h: 3 }); // fallback ratio
        img.src = src;
      }));

      Promise.all(loads).then(imgs => {
        allImages = imgs.map(i => i.src);
        const containerWidth = gallery.clientWidth;

        // Group into justified rows
        const rows = [];
        let row = [];
        let rowWidth = 0;

        for (const img of imgs) {
          const aspect = img.w / img.h;
          const scaledW = TARGET_HEIGHT * aspect;
          const projectedWidth = rowWidth + scaledW + (row.length * GAP);

          if (projectedWidth > containerWidth && row.length > 0) {
            rows.push(row);
            row = [];
            rowWidth = 0;
          }

          row.push({ src: img.src, aspect });
          rowWidth += scaledW;
        }
        if (row.length) rows.push(row);

        // Render rows
        rows.forEach((rowItems, ri) => {
          const isLastRow = ri === rows.length - 1;
          const totalAspect = rowItems.reduce((s, i) => s + i.aspect, 0);
          const totalGaps   = (rowItems.length - 1) * GAP;

          // Last row: don't stretch, cap at target height
          const rowH = isLastRow && rowItems.length < 4
            ? Math.min(TARGET_HEIGHT, (containerWidth - totalGaps) / totalAspect)
            : (containerWidth - totalGaps) / totalAspect;

          const rowEl = document.createElement('div');
          rowEl.className = 'gallery-row';

          rowItems.forEach((item, ii) => {
            const w = item.aspect * rowH;
            const globalIndex = allImages.indexOf(item.src);

            const wrap = document.createElement('div');
            wrap.className = 'gallery-item';
            wrap.style.width  = `${w}px`;
            wrap.style.height = `${rowH}px`;
            wrap.dataset.index = globalIndex;

            const img = document.createElement('img');
            img.src = item.src;
            img.alt = '';
            img.loading = 'lazy';
            img.draggable = false;

            const overlay = document.createElement('div');
            overlay.className = 'gallery-item-overlay';

            wrap.appendChild(img);
            wrap.appendChild(overlay);
            wrap.addEventListener('click', () => openLightbox(globalIndex));
            rowEl.appendChild(wrap);
          });

          gallery.appendChild(rowEl);
        });
      });
    }

    // ── Fetch & render ─────────────────────────────────────────────
    function refresh() {
      fetch('/api/images')
        .then(r => r.json())
        .then(srcs => buildGrid(srcs))
        .catch(() => {});
    }

    // ── Lightbox ───────────────────────────────────────────────────
    function openLightbox(index) {
      currentIndex = index;
      showLightboxImage();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function showLightboxImage() {
      lbImg.style.animation = 'none';
      lbImg.offsetHeight; // reflow
      lbImg.style.animation = '';
      lbImg.src = allImages[currentIndex];
      lbCounter.textContent = `${currentIndex + 1} / ${allImages.length}`;
    }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + allImages.length) % allImages.length;
      showLightboxImage();
    });
    document.getElementById('lb-next').addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % allImages.length;
      showLightboxImage();
    });

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') { currentIndex = (currentIndex - 1 + allImages.length) % allImages.length; showLightboxImage(); }
      if (e.key === 'ArrowRight') { currentIndex = (currentIndex + 1) % allImages.length; showLightboxImage(); }
    });

    // ── Live updates via SSE ───────────────────────────────────────
    function connectSSE() {
      const es = new EventSource('/api/watch');
      es.onmessage = e => { if (e.data === 'refresh') refresh(); };
      es.onerror   = () => { es.close(); setTimeout(connectSSE, 3000); };
    }

    // ── Rebuild grid on resize ─────────────────────────────────────
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(refresh, 200);
    });

    // ── Init ───────────────────────────────────────────────────────
    refresh();
    connectSSE();
  </script>
</body>
</html>
